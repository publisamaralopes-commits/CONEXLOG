<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-weight: 600;
      margin-bottom: 16px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.8rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }

    .card-header h2 {
      margin-bottom: 0;
      white-space: nowrap;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 130px;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    input[type="text"]:focus {
      border-color: #4f6ef7;
      background: #fff;
    }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding-left: 34px;
      min-width: 0;
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #bbb;
      font-size: 1rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      display: none;
    }

    .clear-btn:hover { color: #888; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: #4f6ef7;
      color: #fff;
      padding: 10px 20px;
    }

    .btn-primary:hover { background: #3a57e8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-delete {
      background: transparent;
      color: #e53935;
      padding: 6px 12px;
      font-size: 0.82rem;
      border: 1.5px solid #fccfce;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .btn-delete:hover { background: #fff0f0; }

    .error-msg {
      color: #e53935;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .customer-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .customer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 8px;
      background: #f9f9fb;
      border: 1px solid #ebebeb;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .customer-info strong {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .customer-info span {
      font-size: 0.85rem;
      color: #888;
    }

    mark {
      background: #fff3b0;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    .count-badge {
      display: inline-block;
      background: #eef0fe;
      color: #4f6ef7;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Customer Management</h1>
    <p class="subtitle">Add, view, and remove your customers.</p>

    <div class="card">
      <h2>Add Customer</h2>
      <div class="form-row">
        <input type="text" id="name" placeholder="Full name" autocomplete="off" />
        <input type="text" id="phone" placeholder="Phone number" autocomplete="off" />
        <button class="btn-primary" id="addBtn" onclick="addCustomer()">Add</button>
      </div>
      <div class="error-msg" id="formError"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>
          Customers
          <span class="count-badge" id="countBadge">0</span>
        </h2>
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="9" r="7"/><line x1="14.5" y1="14.5" x2="19" y2="19"/>
          </svg>
          <input type="text" id="search" placeholder="Search by name or phone…" autocomplete="off" oninput="onSearch()" />
          <button class="clear-btn" id="clearBtn" onclick="clearSearch()" title="Clear search">✕</button>
        </div>
      </div>
      <ul class="customer-list" id="customerList">
        <li class="empty-state">Loading…</li>
      </ul>
    </div>
  </div>

  <script>
    const API = "/api/customers";
    let allCustomers = [];

    async function loadCustomers() {
      try {
        const res = await fetch(API);
        allCustomers = await res.json();
        applyFilter();
      } catch {
        document.getElementById("customerList").innerHTML =
          '<li class="empty-state">Failed to load customers.</li>';
      }
    }

    function onSearch() {
      const val = document.getElementById("search").value;
      document.getElementById("clearBtn").style.display = val ? "block" : "none";
      applyFilter();
    }

    function clearSearch() {
      document.getElementById("search").value = "";
      document.getElementById("clearBtn").style.display = "none";
      applyFilter();
      document.getElementById("search").focus();
    }

    function applyFilter() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const filtered = q
        ? allCustomers.filter(c =>
            c.name.toLowerCase().includes(q) || c.phone.toLowerCase().includes(q))
        : allCustomers;
      renderCustomers(filtered, q);
    }

    function highlight(text, query) {
      if (!query) return escHtml(text);
      const escaped = escHtml(text);
      const escapedQ = escHtml(query).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return escaped.replace(new RegExp(escapedQ, "gi"), m => `<mark>${m}</mark>`);
    }

    function renderCustomers(customers, query = "") {
      const list = document.getElementById("customerList");
      const badge = document.getElementById("countBadge");
      const q = document.getElementById("search").value.trim().toLowerCase();

      badge.textContent = allCustomers.length;

      if (!customers || customers.length === 0) {
        const msg = q
          ? `No customers match "<strong>${escHtml(q)}</strong>".`
          : "No customers yet. Add one above.";
        list.innerHTML = `<li class="empty-state">${msg}</li>`;
        return;
      }

      list.innerHTML = customers.map(c => `
        <li class="customer-item" id="c-${c.id}">
          <div class="customer-info">
            <strong>${highlight(c.name, query)}</strong>
            <span>${highlight(c.phone, query)}</span>
          </div>
          <button class="btn-delete" onclick="deleteCustomer('${c.id}')">Remove</button>
        </li>
      `).join("");
    }

    async function addCustomer() {
      const nameEl = document.getElementById("name");
      const phoneEl = document.getElementById("phone");
      const errEl = document.getElementById("formError");
      const btn = document.getElementById("addBtn");

      const name = nameEl.value.trim();
      const phone = phoneEl.value.trim();

      errEl.textContent = "";
      if (!name || !phone) {
        errEl.textContent = "Both name and phone are required.";
        return;
      }

      btn.disabled = true;
      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, phone }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || "Failed to add customer.";
          return;
        }
        nameEl.value = "";
        phoneEl.value = "";
        await loadCustomers();
      } catch {
        errEl.textContent = "Network error. Please try again.";
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteCustomer(id) {
      const item = document.getElementById("c-" + id);
      if (item) item.style.opacity = "0.4";
      try {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        await loadCustomers();
      } catch {
        if (item) item.style.opacity = "1";
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    document.getElementById("phone").addEventListener("keydown", e => {
      if (e.key === "Enter") addCustomer();
    });
    document.getElementById("name").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("phone").focus();
    });

    loadCustomers();
  </script>
</body>
</html>
